<html>
    <head>
        <link href="./src/fonts/CursedTimerUlil-Aznm.ttf" rel="stylesheet">
        <link rel="stylesheet" href="index.css">
        
    </head>
    <body>
        <div class="container">
            <div class="score-container">
                <div class="score-item">
                    <h3>HOME</h3>
                    <p class="score" id="home-score-p"></p>
                    <button class="score-btn" onclick="addHomeScore(1)">+1</button>
                    <button class="score-btn" onclick="addHomeScore(2)">+2</button>
                    <button class="score-btn" onclick="addHomeScore(3)">+3</button>
                </div>
                <div class="score-item">
                    <h3>GUEST</h3>
                    <p class="score" id="guest-score-p"></p>
                    <button class="score-btn" onclick="addGuestScore(1)">+1</button>
                    <button class="score-btn" onclick="addGuestScore(2)">+2</button>
                    <button class="score-btn" onclick="addGuestScore(3)">+3</button>
                </div>
            </div>
            <div>
                <button id="new-game-btn" onclick="init()">New Game</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
